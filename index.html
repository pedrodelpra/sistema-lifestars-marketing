<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeStars — Marketing OS</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Google APIs -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
</head>
<body>

    <div class="system-header">
        <div class="logo-area">
            <img src="logo.png" alt="LifeStars" class="topbar-logo">
        </div>
        <div class="topbar-content">
            <div class="topbar-left">
                <h1 class="topbar-title" id="topbar-title">Dashboard</h1>
            </div>
            <div class="topbar-actions">
                <div class="topbar-date" id="topbar-date" onclick="window.navigate('conteudo')"></div>
            </div>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <!-- Sidebar Nav starts directly here -->

        <nav class="sidebar-nav">
            <button class="sidebar-toggle-nav" onclick="window.toggleSidebar()" title="Alternar Menu">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <a href="#dashboard" class="nav-item active" data-page="dashboard" onclick="navigate('dashboard'); renderPage('dashboard');">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                </div>
                <span>Dashboard</span>
            </a>

            <!-- Estratégia Dropdown -->
            <div class="nav-group" id="group-estrategia">
                <button class="nav-item nav-dropdown-btn" onclick="this.parentElement.classList.toggle('expanded')">
                    <div class="icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    </div>
                    <span>Sobre</span>
                    <svg class="dropdown-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div class="nav-group-content">
                    <a href="#brand" class="nav-item sub-item" data-page="brand"><span>Marca</span></a>
                    <a href="#personas" class="nav-item sub-item" data-page="personas"><span>Público</span></a>
                    <a href="#analises" class="nav-item sub-item" data-page="analises"><span>SWOT</span></a>
                </div>
            </div>

            <hr class="nav-divider">
            
            <a href="#conteudo" class="nav-item" data-page="conteudo">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </div>
                <span>Calendário</span>
            </a>
            <a href="#kanban" class="nav-item" data-page="kanban">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
                </div>
                <span>Projetos</span>
            </a>
            <a href="#leads" class="nav-item" data-page="leads">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                </div>
                <span>Leads</span>
            </a>
            <a href="#ads" class="nav-item" data-page="ads">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                </div>
                <span>Ads</span>
            </a>

            <a href="#seo" class="nav-item" data-page="seo">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><path d="M11 3v4M11 15v4M3 11h4M15 11h4"/></svg>
                </div>
                <span>SEO</span>
            </a>
            <a href="#clientes" class="nav-item" data-page="clientes">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                </div>
                <span>Autorizações</span>
            </a>

            <a href="#senhas" class="nav-item" data-page="senhas">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <span>Senhas</span>
            </a>
            <hr class="nav-divider">
            
            <a href="#equipe" class="nav-item" data-page="equipe">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </div>
                <span>Configurações</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar">MK</div>
                <div class="user-info">
                    <div class="user-name">Equipe Marketing</div>
                    <div class="user-role">LifeStars Admin</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main">

        <section class="content-viewport">
            <!-- Dashboard Page -->
            <div id="page-dashboard" class="page active">
                <!-- Renderizado dinamicamente pelo Templates.dashboard -->
            </div>

            <!-- Dynamic Page Containers -->
            <div id="page-institucional" class="page"></div>
            <div id="page-brand" class="page"></div>
            <div id="page-personas" class="page"></div>
            <div id="page-analises" class="page"></div>
            <div id="page-conteudo" class="page"></div>
            <div id="page-kanban" class="page"></div>
            <div id="page-relatorios" class="page"></div>
            <div id="page-leads" class="page"></div>
            <div id="page-clientes" class="page"></div>
            <div id="page-equipe" class="page"></div>
            <div id="page-senhas" class="page"></div>
            <div id="page-seo" class="page"></div>
            <div id="page-ads" class="page"></div>

        </section>
    </main>

    <script src="main.js" type="module"></script>
    <!-- Modal System -->
    <div id="modal-overlay" class="modal-overlay">
        <div id="modal-container"></div>
    </div>

    <!-- Sync Overlay -->
    <div id="sync-overlay" style="display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 9999; backdrop-filter: blur(4px); flex-direction: column; align-items: center; justify-content: center; gap: 20px;">
        <div style="width: 40px; height: 40px; border: 4px solid var(--brand-primary-soft); border-top-color: var(--brand-primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <div style="font-size: 16px; font-weight: 800; color: var(--text-main);">Sincronizando com Google Drive...</div>
    </div>
</body>
</html>
